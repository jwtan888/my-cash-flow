<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Template Machine Setting Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .machine-btn:active { transform: scale(0.95); }
        .active-filter { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; border-width: 2px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-slate-900">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 flex flex-row justify-between items-center bg-white p-6 rounded-xl border shadow-sm min-h-[120px]">
            <div class="flex-shrink-0">
                <h1 class="text-xl md:text-3xl font-bold text-slate-800 leading-tight">Auto Template<br>Machine Setting Log</h1>
                <p class="text-blue-600 text-xl font-black tracking-widest mt-1">M&A</p>
            </div>
            <div class="flex items-center justify-end overflow-hidden ml-4">
                <img src="image_8454b6.png" alt="M&A Logo" class="h-16 md:h-24 w-auto object-contain">
            </div>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
            <div class="flex flex-wrap items-center justify-between mb-4 border-b pb-4 gap-2">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">New Log Entry</h2>
                <div class="flex items-center gap-3 bg-slate-50 px-3 py-2 rounded-lg border">
                    <span class="text-sm font-semibold text-slate-700">New Template Request</span>
                    <label class="switch">
                        <input type="checkbox" id="requestToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <select id="mID" class="p-2 border rounded bg-white text-sm font-bold text-blue-800">
                    <option value="AQM0001">AQM0001 (ZJ-AM5770AH-750)</option>
                    <option value="AQM0002">AQM0002 (ZJ-AMS-AH-RK900)</option>
                    <option value="AQM0003">AQM0003 (ZJ-M5-S900H-SF)</option>
                    <option value="AQM0004">AQM0004 (ZJ-M5-S900H-SF)</option>
                    <option value="AQM0005">AQM0005 (JTK8T-8037AJS)</option>
                    <option value="AQM0006">AQM0006 (M9-SS-F13-X)</option>
                    <option value="AQM0007">AQM0007 (JTK8T-8037AJS)</option>
                    <option value="AQM0008">AQM0008 (JTK8T-8037AJS)</option>
                </select>
                <select id="picName" class="p-2 border rounded bg-white text-sm">
                    <option value="">Select PIC</option>
                    <option>Keat</option><option>Viki</option><option>Ram</option>
                    <option>James</option><option>Phone</option><option>Mark</option><option>Joe</option>
                </select>
                <input type="text" id="fName" placeholder="File Name / Style" class="p-2 border rounded text-sm">
                <input type="number" id="sTime" placeholder="Setting Time (min)" class="p-2 border rounded text-sm">
                <button onclick="addEntry()" id="submitBtn" class="bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 shadow-md transition-all active:scale-95">Add Record</button>
            </div>
        </div>

        <div class="mb-4 bg-white p-6 rounded-xl border shadow-sm">
            <h3 class="text-xs font-bold text-slate-400 uppercase mb-3 tracking-widest">Filter by Machine ID:</h3>
            <div class="flex flex-wrap gap-2 mb-6" id="filterContainer">
                <button onclick="setMachineFilter('ALL')" id="btn-ALL" class="machine-btn px-5 py-1.5 border rounded-full text-sm bg-white active-filter shadow-sm">ALL</button>
            </div>
            
            <div class="w-full">
                <div id="specDisplay" class="hidden mb-4 p-4 bg-slate-50 border-l-4 border-blue-600 rounded-r-lg">
                    <p id="brandRow" class="text-sm font-bold text-slate-500 uppercase tracking-tight"></p>
                    <p id="modelRow" class="text-xl font-black text-blue-800 italic"></p>
                </div>

                <div class="flex justify-between items-end mb-2">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Search Records:</h3>
                    <div class="flex items-center gap-2">
                        <span id="syncStatus" class="text-[10px] text-slate-400 font-bold">Syncing...</span>
                        <button onclick="refreshLiveLogs()" class="text-[10px] bg-slate-100 px-2 py-0.5 rounded border hover:bg-slate-200">Force Refresh</button>
                    </div>
                </div>
                <input type="text" id="fileSearch" oninput="applyFilters()" placeholder="Search by File Name or PIC..." 
                    class="w-full p-2.5 border rounded-lg bg-slate-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-100 border-b">
                    <tr>
                        <th class="p-3 font-semibold text-slate-600">Timestamp</th>
                        <th class="p-3 font-semibold text-slate-600">Machine</th>
                        <th class="p-3 font-semibold text-slate-600">PIC</th>
                        <th class="p-3 font-semibold text-slate-600">Type</th>
                        <th class="p-3 font-semibold text-slate-600">File Name</th>
                        <th class="p-3 font-semibold text-slate-600">Time</th>
                    </tr>
                </thead>
                <tbody id="logTable">
                    <tr><td colspan="6" class="p-10 text-center text-slate-400 italic">Syncing with M&A Central Database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const postURL = "https://defaultb4f081a089004baaa6a8ff79312af2.61.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8467b362b45c4408a5c3b36138d34d8d/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=kYDfwYnTE9IU71pqIibsp0QU2WYzQ0zORaGj2bjaDAs";
        const fetchURL = "https://defaultb4f081a089004baaa6a8ff79312af2.61.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/47006a48f8764a49ab01dbb665617acf/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=2eqeoBWF-80BETYDfV2HdHZeqJW7-fDYjd3GXri1wNo";

        // Updated Brands
        const machineSpecs = {
            "AQM0001": { brand: "ZOJE", model: "ZJ-AM5770AH-750" },
            "AQM0002": { brand: "ZOJE", model: "ZJ-AMS-AH-RK900" },
            "AQM0003": { brand: "ZOJE", model: "ZJ-M5-S900H-SF" },
            "AQM0004": { brand: "ZOJE", model: "ZJ-M5-S900H-SF" },
            "AQM0005": { brand: "JUITA", model: "JTK8T-8037AJS" },
            "AQM0006": { brand: "JACK", model: "M9-SS-F13-X" },
            "AQM0007": { brand: "JUITA", model: "JTK8T-8037AJS" },
            "AQM0008": { brand: "JUITA", model: "JTK8T-8037AJS" }
        };

        let allRecords = [];
        let currentMachineFilter = 'ALL';
        const machines = Object.keys(machineSpecs);

        const filterContainer = document.getElementById('filterContainer');
        machines.forEach(m => {
            const btn = document.createElement('button');
            btn.innerText = m;
            btn.id = `btn-${m}`;
            btn.className = "machine-btn px-4 py-1.5 border rounded-full text-sm bg-white shadow-sm hover:border-blue-300 transition-all";
            btn.onclick = () => setMachineFilter(m);
            filterContainer.appendChild(btn);
        });

        // Smart Mapping for Excel
        function getVal(item, keys) {
            for (let key of keys) {
                if (item[key] !== undefined && item[key] !== null) return item[key];
                for (let actualKey in item) {
                    if (actualKey.toLowerCase().replace(/[^a-z0-9]/g, '') === key.toLowerCase().replace(/[^a-z0-9]/g, '')) {
                        return item[actualKey];
                    }
                }
            }
            return "---";
        }

        // Fix for Excel Serial Date (e.g. 45678.123)
        function formatTimestamp(val) {
            if (!val || val === "---") return "---";
            if (!isNaN(val) && parseFloat(val) > 40000) {
                const date = new Date(Math.round((parseFloat(val) - 25569) * 86400 * 1000));
                return date.toLocaleString();
            }
            return val.toString();
        }

        async function refreshLiveLogs() {
            const status = document.getElementById('syncStatus');
            try {
                const response = await fetch(fetchURL, { method: 'POST', body: JSON.stringify({}) });
                if (!response.ok) throw new Error("HTTP " + response.status);
                
                const data = await response.json();
                allRecords = data.map(item => ({
                    timestamp: formatTimestamp(getVal(item, ['Timestamp', 'Date', 'Time_x0020_Stamp', 'DateTime'])),
                    machine: getVal(item, ['Machine', 'MachineID', 'mID']),
                    pic: getVal(item, ['PIC', 'Operator', 'PICName']),
                    type: getVal(item, ['Type', 'LogType', 'Log_x0020_Type']),
                    file: getVal(item, ['FileName', 'file name', 'File_x0020_Name', 'Style']),
                    time: getVal(item, ['Time', 'SettingTime', 'Minutes'])
                }));

                status.innerText = "LIVE SYNC OK";
                status.className = "text-[10px] text-emerald-500 font-bold";
                applyFilters();
            } catch (error) {
                status.innerText = "SYNC FAILED (400)";
                status.className = "text-[10px] text-red-500 font-bold";
            }
        }

        async function addEntry() {
            const m = document.getElementById('mID').value;
            const pic = document.getElementById('picName').value;
            const f = document.getElementById('fName').value;
            const t = document.getElementById('sTime').value;
            const isNewRequest = document.getElementById('requestToggle').checked;

            if(!pic || !f || !t) return alert("Fill all fields");

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            const entry = {
                timestamp: new Date().toLocaleString(),
                machine: m,
                pic: pic,
                type: isNewRequest ? "NEW REQUEST" : "SETTING",
                file: f,
                time: t.toString()
            };

            try {
                const res = await fetch(postURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(entry)
                });
                
                if(res.ok) {
                    document.getElementById('fName').value = '';
                    document.getElementById('sTime').value = '';
                    setTimeout(refreshLiveLogs, 5000);
                }
            } catch (error) {
                alert("Network Error");
            } finally {
                btn.innerText = "Add Record";
                btn.disabled = false;
            }
        }

        function setMachineFilter(machineId) {
            currentMachineFilter = machineId;
            document.querySelectorAll('.machine-btn').forEach(b => b.classList.remove('active-filter'));
            document.getElementById(`btn-${machineId}`).classList.add('active-filter');
            
            const specDisplay = document.getElementById('specDisplay');
            if(machineId === 'ALL') {
                specDisplay.classList.add('hidden');
            } else {
                specDisplay.classList.remove('hidden');
                document.getElementById('brandRow').innerText = "Brand: " + machineSpecs[machineId].brand;
                document.getElementById('modelRow').innerText = "Model: " + machineSpecs[machineId].model;
            }
            applyFilters();
        }

        function applyFilters() {
            const searchVal = document.getElementById('fileSearch').value.toLowerCase();
            const filtered = allRecords.filter(r => {
                const matchesMachine = (currentMachineFilter === 'ALL' || r.machine === currentMachineFilter);
                const matchesSearch = String(r.file).toLowerCase().includes(searchVal) || String(r.pic).toLowerCase().includes(searchVal);
                return matchesMachine && matchesSearch;
            });
            updateTable(filtered);
        }

        function updateTable(data) {
            const tbody = document.getElementById('logTable');
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400 italic">No history found.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="p-3 text-slate-400 text-[10px]">${r.timestamp}</td>
                    <td class="p-3 font-bold text-blue-700">${r.machine}</td>
                    <td class="p-3 font-medium text-slate-700">${r.pic}</td>
                    <td class="p-3">
                        <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${r.type === 'NEW REQUEST' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'}">
                            ${r.type}
                        </span>
                    </td>
                    <td class="p-3 text-slate-700 font-mono">${r.file}</td>
                    <td class="p-3 font-bold text-slate-800">${r.time} min</td>
                </tr>
            `).join('');
        }

        refreshLiveLogs();
        setInterval(refreshLiveLogs, 60000);
    </script>
</body>
</html>
