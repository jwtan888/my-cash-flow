<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Template Machine Setting Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .machine-btn:active { transform: scale(0.95); }
        .active-filter { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; border-width: 2px; font-weight: 800; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(22px); }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .sync-active { animation: pulse-green 2s infinite; }
        td { font-size: 0.75rem; line-height: 1rem; } 
        .manual-input { font-size: 10px; padding: 2px 4px; border: 1px solid #cbd5e1; border-radius: 4px; width: 95px; outline: none; margin-bottom: 2px; font-family: monospace; }
        .qty-input { width: 60px; font-weight: bold; color: #2563eb; border: 1px solid #94a3b8; }
        .manual-input:focus { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb; }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-slate-900">
    <div class="max-w-[1600px] mx-auto">
        <header class="mb-4 flex flex-row justify-between items-center bg-white p-6 rounded-t-xl border-x border-t shadow-sm">
            <div class="flex-shrink-0">
                <h1 class="text-xl md:text-3xl font-bold text-slate-800 leading-tight" id="mainTitle">Template Requests</h1>
                <p class="text-slate-400 text-lg font-light tracking-[0.2em] mt-1 uppercase">M&A</p>
            </div>
            <div id="userSessionArea" class="flex items-center gap-3 bg-slate-50 border p-2 rounded-xl shadow-inner">
                <div id="loginView" class="flex items-center gap-2">
                    <select id="userSelect" class="text-xs font-bold p-2 border rounded bg-white outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Select User...</option>
                        <option>Keat</option><option>Viki</option><option>Ram</option>
                        <option>James</option><option>Phone</option><option>Mark</option><option>Joe</option>
                    </select>
                    <button onclick="login()" class="bg-slate-800 text-white text-[10px] font-bold px-4 py-2 rounded uppercase hover:bg-blue-600 transition-all">Login</button>
                </div>
                <div id="activeUserView" class="hidden flex items-center gap-3">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-tighter">Active: <span id="displayUserName" class="text-blue-600 ml-1">---</span></span>
                    <button onclick="logout()" class="text-[10px] font-bold text-red-500 border border-red-200 px-2 py-1 rounded hover:bg-red-50">Logout</button>
                </div>
                <img src="logo.png" alt="M&A Logo" class="h-6 md:h-8 w-auto object-contain opacity-90 ml-2">
            </div>
        </header>

        <nav class="flex bg-white border-x border-b rounded-b-xl mb-6 shadow-sm overflow-hidden">
            <button onclick="switchTab('template')" id="tab-template" class="flex-1 py-4 text-sm uppercase tracking-widest font-bold text-slate-400 border-b-4 border-transparent hover:bg-slate-50 tab-active">Template Requests</button>
            <button onclick="switchTab('setting')" id="tab-setting" class="flex-1 py-4 text-sm uppercase tracking-widest font-bold text-slate-400 border-b-4 border-transparent hover:bg-slate-50">Machine Setting</button>
        </nav>

        <div id="content-template" class="tab-content">
            <div class="bg-white p-6 rounded-xl border shadow-sm mb-4">
                <div class="flex justify-between items-center mb-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <h3>Search Templates:</h3><span id="tempSyncStatus">Checking...</span>
                </div>
                <input type="text" id="tempSearch" oninput="applyTempFilters()" placeholder="Search Style, Job No, or PIC..." class="w-full p-2.5 border rounded-lg bg-slate-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 border-b text-[11px] uppercase tracking-wider text-slate-500 font-bold">
                        <tr>
                            <th class="p-3">ID</th><th class="p-3">Start Time</th><th class="p-3">Section</th><th class="p-3">Requestor</th><th class="p-3">Style</th>
                            <th class="p-3">Job No</th><th class="p-3">Machine</th><th class="p-3">Required</th><th class="p-3">Status</th><th class="p-3">M&A PIC</th><th class="p-3 text-blue-600">Qty</th><th class="p-3">Complete Time</th>
                        </tr>
                    </thead>
                    <tbody id="tempTable" class="text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div id="content-setting" class="tab-content hidden">
            <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
                <div class="flex flex-wrap items-center justify-between mb-4 border-b pb-4 gap-2">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">New Log Entry</h2>
                    <div class="flex items-center gap-3 bg-slate-50 px-3 py-2 rounded-lg border">
                        <span class="text-sm font-semibold text-slate-700">New Template Request</span>
                        <label class="switch"><input type="checkbox" id="requestToggle"><span class="slider"></span></label>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                    <select id="mID" class="p-2 border rounded bg-white text-sm font-bold text-blue-800">
                        <option value="AQM0001">AQM0001 (ZOJE)</option><option value="AQM0002">AQM0002 (ZOJE)</option><option value="AQM0003">AQM0003 (ZOJE)</option><option value="AQM0004">AQM0004 (ZOJE)</option><option value="AQM0005">AQM0005 (JUITA)</option><option value="AQM0006">AQM0006 (JACK)</option><option value="AQM0007">AQM0007 (JUITA)</option><option value="AQM0008">AQM0008 (JUITA)</option>
                    </select>
                    <select id="picName" class="p-2 border rounded bg-white text-sm">
                        <option value="">Select PIC</option><option>Keat</option><option>Viki</option><option>Ram</option><option>James</option><option>Phone</option><option>Mark</option><option>Joe</option>
                    </select>
                    <input type="text" id="fName" placeholder="File Name / Style" class="p-2 border rounded text-sm">
                    <input type="number" id="sTime" placeholder="Setting Time (min)" class="p-2 border rounded text-sm">
                    <button onclick="addEntry()" id="submitBtn" class="bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 shadow-md transition-all active:scale-95">Add Record</button>
                </div>
            </div>
            <div class="mb-4 bg-white p-6 rounded-xl border shadow-sm">
                <div class="flex items-center justify-between mb-3 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <h3>Filter by Machine ID:</h3>
                    <div id="machineDetailBox" class="text-blue-600 bg-blue-50 px-3 py-1 rounded hidden border border-blue-100"></div>
                </div>
                <div class="flex flex-wrap gap-2 mb-6" id="filterContainer">
                    <button onclick="setMachineFilter('ALL')" id="btn-ALL" class="machine-btn px-5 py-1.5 border rounded-full text-sm bg-white active-filter shadow-sm">ALL</button>
                </div>
                <div class="flex justify-between items-end mb-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <h3>Search History:</h3><span id="syncStatus">Syncing...</span>
                </div>
                <input type="text" id="fileSearch" oninput="applyFilters()" placeholder="Search PIC or File..." class="w-full p-2.5 border rounded-lg bg-slate-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 border-b text-[11px] uppercase tracking-wider text-slate-500 font-bold">
                        <tr><th class="p-3">Timestamp</th><th class="p-3">Machine ID</th><th class="p-3">PIC</th><th class="p-3">Type</th><th class="p-3">File Name</th><th class="p-3">Time</th></tr>
                    </thead>
                    <tbody id="logTable" class="text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const postURL = "https://defaultb4f081a089004baaa6a8ff79312af2.61.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8467b362b45c4408a5c3b36138d34d8d/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=kYDfwYnTE9IU71pqIibsp0QU2WYzQ0zORaGj2bjaDAs";
        const fetchURL = "https://defaultb4f081a089004baaa6a8ff79312af2.61.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/47006a48f8764a49ab01dbb665617acf/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=2eqeoBWF-80BETYDfV2HdHZeqJW7-fDYjd3GXri1wNo";
        const templateFetchURL = "https://defaultb4f081a089004baaa6a8ff79312af2.61.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/81581050d13a4df09275905e9e05e2df/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=yWugYHV-OyqB2yVi3eSd94XXEA2CgOngdaCVf83xBtA";
        const updateURL = "https://defaultb4f081a089004baaa6a8ff79312af2.61.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a37c891f30994fef90aac14c55e2388e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=6ostk6jCT6jb4Nx4lBi6fO_56axOeQPPm9Oo1_hcw7c";

        const machineSpecs = { "AQM0001": { brand: "ZOJE", model: "ZJ-AM5770AH-750" }, "AQM0002": { brand: "ZOJE", model: "ZJ-AMS-AH-RK900" }, "AQM0003": { brand: "ZOJE", model: "ZJ-M5-S900H-SF" }, "AQM0004": { brand: "ZOJE", model: "ZJ-M5-S900H-SF" }, "AQM0005": { brand: "JUITA", model: "JTK8T-8037AJS" }, "AQM0006": { brand: "JACK", model: "M9-SS-F13-X" }, "AQM0007": { brand: "JUITA", model: "JTK8T-8037AJS" }, "AQM0008": { brand: "JUITA", model: "JTK8T-8037AJS" } };
        let allRecords = [], allTemplates = [], currentUser = localStorage.getItem('ma_session_user') || null;

        function getVal(item, keys) { for (let k of Object.keys(item)) { for (let target of keys) { if (k.toLowerCase().replace(/[^a-z0-9]/g, '').includes(target.toLowerCase().replace(/[^a-z0-9]/g, ''))) return item[k]; } } return "---"; }

        function convertExcelDate(v, isTimestamp = true) {
            if (!v || v === "---") return "---";
            
            // Handle numeric Excel serial numbers (e.g. 46086.5)
            if (!isNaN(v) && parseFloat(v) > 40000) {
                let date = new Date(Math.round((v - 25569) * 86400 * 1000));
                let m = date.getUTCMonth() + 1;
                let d = date.getUTCDate();
                let y = date.getUTCFullYear();
                let hh = String(date.getUTCHours()).padStart(2, '0');
                let mm = String(date.getUTCMinutes()).padStart(2, '0');
                return isTimestamp ? `${m}/${d}/${y} ${hh}:${mm}` : `${m}/${d}/${y}`;
            }

            // Handle string dates (e.g. 6/3/2026)
            let str = String(v).replace('Z', '').trim();
            let slashMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(.*)/);
            if (slashMatch) {
                let timePart = slashMatch[4].trim() || "00:00";
                // Forced Flipping logic: Month/Day/Year
                return isTimestamp ? `${slashMatch[2]}/${slashMatch[1]}/${slashMatch[3]} ${timePart}` : `${slashMatch[2]}/${slashMatch[1]}/${slashMatch[3]}`;
            }
            return str;
        }

        async function refreshTemplateLogs(s = false) {
            const st = document.getElementById('tempSyncStatus'); if(!s) st.classList.add('sync-active');
            try {
                const r = await fetch(templateFetchURL + "&cb=" + Date.now(), { method: 'POST', body: JSON.stringify({}) });
                const d = await r.json();
                allTemplates = d.map(i => ({ 
                    id: i['Id'] || getVal(i, ['Id']),
                    startTime: convertExcelDate(getVal(i, ['Start time'])), 
                    section: getVal(i, ['Section']),
                    requestor: getVal(i, ['Requestor']), 
                    style: getVal(i, ['Style Number']), 
                    jobNo: getVal(i, ['Job Number']), 
                    machine: getVal(i, ['Machine Type']), 
                    requiredDate: convertExcelDate(getVal(i, ['Required Date']), false), 
                    completeDate: getVal(i, ['Complete Date']), 
                    qty: getVal(i, ['Quantity', 'Complete Qty', 'Qty']),
                    pic: getVal(i, ['M&A PIC']), 
                    raw: getVal(i, ['Start time']) 
                })).sort((a,b)=>b.raw - a.raw);
                st.innerText = "LIVE: " + new Date().toLocaleTimeString(); st.classList.remove('sync-active'); applyTempFilters();
            } catch (e) { st.innerText = "Error"; }
        }

        function switchTab(t) { document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden')); document.getElementById(`content-${t}`).classList.remove('hidden'); document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active')); document.getElementById(`tab-${t}`).classList.add('tab-active'); document.getElementById('mainTitle').innerText = t === 'template' ? 'Template Requests' : 'Auto Template Machine Setting Log'; }
        function login() { const u = document.getElementById('userSelect').value; if (!u) return alert("Select Name"); localStorage.setItem('ma_session_user', u); currentUser = u; updateSessionUI(); applyTempFilters(); }
        function logout() { localStorage.removeItem('ma_session_user'); currentUser = null; updateSessionUI(); applyTempFilters(); }
        function updateSessionUI() { const lv = document.getElementById('loginView'), av = document.getElementById('activeUserView'); if (currentUser) { lv.classList.add('hidden'); av.classList.remove('hidden'); document.getElementById('displayUserName').innerText = currentUser; } else { lv.classList.remove('hidden'); av.classList.add('hidden'); } }

        function applyTempFilters() {
            const sv = document.getElementById('tempSearch').value.toLowerCase();
            const f = allTemplates.filter(t => Object.values(t).some(v => String(v).toLowerCase().includes(sv)));
            document.getElementById('tempTable').innerHTML = f.map(t => {
                const done = t.completeDate && t.completeDate !== '---', mine = currentUser === t.pic;
                const now = new Date();
                const defaultDate = (now.getMonth() + 1) + "/" + now.getDate() + "/" + now.getFullYear();
                const defaultTime = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
                
                return `<tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="p-3 text-slate-400 font-mono">${t.id}</td>
                    <td class="p-3 whitespace-nowrap text-slate-500">${t.startTime}</td>
                    <td class="p-3 text-slate-500">${t.section}</td>
                    <td class="p-3 text-slate-500">${t.requestor}</td>
                    <td class="p-3 text-slate-500">${t.style}</td>
                    <td class="p-3 text-slate-500">${t.jobNo}</td>
                    <td class="p-3 text-slate-400">${t.machine}</td>
                    <td class="p-3 text-slate-400">${t.requiredDate}</td>
                    <td class="p-3"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${done ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${done ? 'COMPLETED' : 'PENDING'}</span></td>
                    <td class="p-3 font-medium ${mine ? 'text-blue-700 underline underline-offset-4' : 'text-slate-500'}">${t.pic}</td>
                    <td class="p-3">${done ? `<span class="font-bold text-slate-700">${t.qty}</span>` : (mine ? `<input type="number" id="qty-${t.id}" class="manual-input qty-input" placeholder="Qty">` : `---`)}</td>
                    <td class="p-3">${done ? `<span class="text-[10px] text-emerald-600 font-bold">${convertExcelDate(t.completeDate)}</span>` : (mine ? `<div class="flex flex-col"><input type="text" id="date-${t.id}" class="manual-input" value="${defaultDate}"><input type="text" id="time-${t.id}" class="manual-input" value="${defaultTime}"><button onclick="saveManualComplete('${t.id}')" class="bg-blue-600 text-white text-[9px] font-bold px-2 py-1 rounded">SAVE</button></div>` : `<span class="text-[9px] text-slate-300 italic uppercase">Locked</span>`)}</td>
                </tr>`;
            }).join('');
        }

        async function saveManualComplete(id) {
            const dateInput = document.getElementById(`date-${id}`).value;
            const timeInput = document.getElementById(`time-${id}`).value;
            const qtyInput = document.getElementById(`qty-${id}`).value;
            if(!dateInput || !timeInput || !qtyInput) return alert("Please fill Qty, Date and Time");
            const parts = dateInput.split('/');
            const isoDate = `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
            const manualTimestamp = `${isoDate} ${timeInput}`;
            const btn = event.target; btn.innerText = "..."; btn.disabled = true;
            try {
                const res = await fetch(updateURL, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ recordID: String(id), pic: currentUser, completionDate: manualTimestamp, completeQty: qtyInput }) 
                });
                if(res.ok) { refreshTemplateLogs(); } else { alert("Sync Error"); btn.innerText = "SAVE"; btn.disabled = false; }
            } catch (e) { alert("Fail"); btn.innerText = "SAVE"; btn.disabled = false; }
        }

        const mList = Object.keys(machineSpecs);
        mList.forEach(m => { const b = document.createElement('button'); b.innerText = m; b.id = `btn-${m}`; b.className = "machine-btn px-4 py-1.5 border rounded-full text-sm bg-white shadow-sm hover:border-blue-300 transition-all"; b.onclick = () => setMachineFilter(m); document.getElementById('filterContainer').appendChild(b); });
        async function refreshLiveLogs(s = false) { const st = document.getElementById('syncStatus'); if(!s) st.classList.add('sync-active'); try { const r = await fetch(fetchURL + "&cb=" + Date.now(), { method: 'POST', body: JSON.stringify({}) }); const d = await r.json(); allRecords = d.map(i => ({ timestamp: convertExcelDate(getVal(i, ['Timestamp'])), machine: getVal(i, ['Machine']), pic: getVal(i, ['PIC']), type: getVal(i, ['Type']), file: getVal(i, ['FileName']), time: getVal(i, ['Time']), raw: getVal(i, ['Timestamp']) })).sort((a,b)=>b.raw - a.raw); st.innerText = "LIVE: " + new Date().toLocaleTimeString(); st.classList.remove('sync-active'); applyFilters(); } catch (e) {} }
        async function addEntry() { const m = document.getElementById('mID').value, p = document.getElementById('picName').value, f = document.getElementById('fName').value, t = document.getElementById('sTime').value, isN = document.getElementById('requestToggle').checked; if(!p || !f || !t) return alert("Fill all fields"); const b = document.getElementById('submitBtn'); b.innerText = "Saving..."; b.disabled = true; try { const now = new Date(); const localStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`; const res = await fetch(postURL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({timestamp: localStr, machine: m, pic: p, type: isN ? "NEW REQUEST" : "SETTING", file: f, time: t}) }); if(res.ok) { document.getElementById('fName').value = ''; document.getElementById('sTime').value = ''; refreshLiveLogs(); } } finally { b.innerText = "Add Record"; b.disabled = false; } }
        let curF = 'ALL';
        function setMachineFilter(m) { curF = m; document.querySelectorAll('.machine-btn').forEach(b => b.classList.remove('active-filter')); document.getElementById(`btn-${m}`).classList.add('active-filter'); const box = document.getElementById('machineDetailBox'); if(m === 'ALL') { box.classList.add('hidden'); } else { box.innerText = `${machineSpecs[m].brand} - ${machineSpecs[m].model}`; box.classList.remove('hidden'); } applyFilters(); }
        function applyFilters() { const s = document.getElementById('fileSearch').value.toLowerCase(); const f = allRecords.filter(r => (curF==='ALL' || r.machine===curF) && (String(r.file).toLowerCase().includes(s) || String(r.pic).toLowerCase().includes(s))); document.getElementById('logTable').innerHTML = f.map(r => `<tr class="border-b hover:bg-slate-50 transition-colors"><td class="p-3 text-slate-400 font-mono whitespace-nowrap">${r.timestamp}</td><td class="p-3 font-bold text-blue-700">${r.machine}</td><td class="p-3 font-medium">${r.pic}</td><td class="p-3"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${r.type === 'NEW REQUEST' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'}">${r.type}</span></td><td class="p-3 font-mono">${r.file}</td><td class="p-3 font-bold">${r.time} min</td></tr>`).join(''); }
        updateSessionUI(); refreshTemplateLogs(); refreshLiveLogs();
        setInterval(() => { refreshTemplateLogs(true); refreshLiveLogs(true); }, 15000);
    </script>
</body>
</html>
